<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | Payoo</title>
    <!-- Link External CSS File -->
    <link rel="stylesheet" href="style.css" />
    <!-- Link Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Inter Font CDN Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome CDN Link -->
    <script
      src="https://kit.fontawesome.com/27daea0603.js"
      crossorigin="anonymous"
    ></script>
    <style>
      .text-green-color {
        color: #00a63e;
      }
    </style>
  </head>
  <body>
    <main
      class="bg-gray-200 w-11/12 md:w-2/3 lg:w-5/12 2xl:w-3/10 mx-auto border border-gray-200 mt-4"
    >
      <!-- head section -->
      <section class="bg-white px-5 pt-4 pb-8 rounded-b-3xl">
        <div
          class="flex justify-between items-center border border-gray-400 p-4 mb-6"
        >
          <!-- Balance section -->
          <div class="flex items-center gap-3">
            <img class="w-16 h-12" src="./assets/logo.png" alt="" />
            <div>
              <p>
                <span class="font-extrabold text-xl mr-1">৳</span
                ><span id="main-balance" class="font-bold text-xl">45100</span>
              </p>
              <p class="text-gray-600">Available Balance</p>
            </div>
          </div>
          <!-- Log Out btn -->
          <button
            class="border border-gray-400 px-3 py-2 text-gray-700 rounded-lg shadow-sm cursor-pointer"
          >
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out
          </button>
        </div>
        <!-- menu section -->
        <h3 class="text-2xl font-bold mb-3">
          Welcome to Pay<span class="text-purple-600">oo</span>
        </h3>
        <p class="text-gray-700">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
        <!-- menu button container -->
        <section class="grid grid-cols-3 gap-6 mt-8 px-5">
          <!-- Menu 1 -->
          <div
            id="add-money-menu-btn"
            class="border border-gray-400 p-4 rounded-lg flex flex-col justify-center items-center cursor-pointer hover:bg-blue-100 hover:border-blue-700 hover:border-2"
          >
            <img class="w-8" src="./assets/opt-1.png" alt="" />
            <p class="text-sm">Add Money</p>
          </div>

          <!-- Menu 2 -->
          <div
            id="cash-out-menu-btn"
            class="border border-gray-400 p-4 rounded-lg flex flex-col justify-center items-center cursor-pointer hover:bg-blue-100 hover:border-blue-700 hover:border-2"
          >
            <img class="w-8" src="./assets/opt-2.png" alt="" />
            <p class="text-sm">Cash Out</p>
          </div>
          <!-- Menu 3 -->
          <div
            id="transfer-money-menu-btn"
            class="border border-gray-400 p-4 rounded-lg flex flex-col justify-center items-center cursor-pointer hover:bg-blue-100 hover:border-blue-700 hover:border-2"
          >
            <img class="w-8" src="./assets/opt-3.png" alt="" />
            <p class="text-sm">Transfer Money</p>
          </div>
          <!-- Menu 4 -->
          <div
            id="get-bonus-menu-btn"
            class="border border-gray-400 p-4 rounded-lg flex flex-col justify-center items-center cursor-pointer hover:bg-blue-100 hover:border-blue-700 hover:border-2"
          >
            <img class="w-8" src="./assets/opt-4.png" alt="" />
            <p class="text-sm">Get Bonus</p>
          </div>
          <!-- Menu 5 -->
          <div
            id="pay-bill-menu-btn"
            class="border border-gray-400 p-4 rounded-lg flex flex-col justify-center items-center cursor-pointer hover:bg-blue-100 hover:border-blue-700 hover:border-2"
          >
            <img class="w-8" src="./assets/opt-5.png" alt="" />
            <p class="text-sm">Pay Bill</p>
          </div>
          <!-- Menu 6 -->
          <div
            id="transactions-menu-btn"
            class="border border-gray-400 p-4 rounded-lg flex flex-col justify-center items-center cursor-pointer hover:bg-blue-100 hover:border-blue-700 hover:border-2"
          >
            <img class="w-8" src="./assets/opt-6.png" alt="" />
            <p class="text-sm">Transactions</p>
          </div>
        </section>
      </section>

      <!-- Transaction History Section -->
      <section id="transaction-history-section" class="hidden px-5 py-6">
        <div class="flex justify-between items-center mb-5">
          <h4 class="text-2xl font-bold">Transaction History</h4>
          <span class="text-gray-600 cursor-pointer">View All</span>
        </div>

        <div id="transaction-container">

        </div>
      </section>

      <!-- Add Money section -->
      <section
        id="add-money-section"
        class="px-5 py-4 bg-white rounded-2xl mb-6 mt-8 mx-5"
      >
        <div class="my-5">
          <h4 class="text-2xl font-bold">Add Money</h4>
        </div>

        <form>
          <!-- Input 1 -->
          <div class="mb-5">
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >Select A Bank</label
            >
            <select
              required
              name="bank-list"
              id="select-bank"
              class="bg-gray-200 w-full px-4 py-3 rounded-xl text-lg text-gray-600 mt-2 focus:outline-none"
            >
              <option selected>Select Bank</option>
              <option value="IBBL">IBBL</option>
              <option value="MTB">MTB</option>
              <option value="SBBL">SBBL</option>
              <option value="ABL">ABL</option>
            </select>
          </div>

          <!-- Input 2 -->
          <div class="mb-5">
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >Bank Account Number</label
            >
            <input
            id="account-number"
              name="number"
              type="number"
              placeholder="Enter 11 digit account number"
              required
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
            />
          </div>

          <!-- Input 3 -->
          <div class="mb-5">
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >How Much Amount</label
            >
            <input
              id="amount"
              name="amount"
              type="number"
              placeholder="Add Amount to withdraw"
              required
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
            />
          </div>

          <!-- Input 4 -->
          <div>
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >Pin Number</label
            >
            <input
              id="pin"
              type="password"
              placeholder="Enter 4 digit pin number"
              maxlength="4"
              required
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
            />
          </div>
          <!-- Add Money button -->
          <input
            type="submit"
            value="Add Money"
            id="add-money-btn"
            class="w-full text-lg font-bold text-white bg-blue-800 hover:bg-blue-700 py-2 rounded-full mt-6 cursor-pointer mb-6"
          />
        </form>
      </section>

      <!-- Cash Out Section -->
      <section
        id="cashout-section-section"
        class="hidden px-5 py-4 bg-white rounded-2xl mb-6 mt-8 mx-5"
      >
        <div class="my-5">
          <h4 class="text-2xl font-bold">Cash Out</h4>
        </div>

        <form id="form" class="bg-white rounded-2xl mb-6">
          <!-- Input 1 -->
          <div class="mb-5">
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >Agent Number</label
            >
            <input
              id="agent-number"
              type="number"
              placeholder="Enter 11 digit number"
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
              required
            />
          </div>

          <!-- Input 2 -->
          <div class="mb-5">
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >Amount</label
            >
            <input
              id="cashout-amount"
              type="number"
              placeholder="Enter amount to withdraw"
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
              required
            />
          </div>

          <!-- Input 3 -->
          <div>
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >4 Digit Pin</label
            >
            <input
              id="cashout-pin"
              type="password"
              placeholder="Enter 4 digit pin number"
              maxlength="4"
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
              required
            />
          </div>

          <!-- Login button -->
          <button
            id="cash-out-btn"
            class="w-full text-lg font-bold text-white bg-blue-800 hover:bg-blue-700 py-2 rounded-full mt-6 cursor-pointer"
          >
            Cash Out
          </button>
        </form>
      </section>

      <!-- Transfer Money Section -->
      <section
        id="transfer-money-section"
        class="hidden px-5 py-4 bg-white rounded-2xl mb-6 mt-8 mx-5"
      >
        <div class="my-5">
          <h4 class="text-2xl font-bold">Transfer Money</h4>
        </div>

        <form id="form" class="bg-white rounded-2xl mb-6">
          <!-- Input 1 -->
          <div class="mb-5">
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >Agent Number</label
            >
            <input
              id="transfer-number"
              type="number"
              placeholder="Enter 11 digit number"
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
              required
            />
          </div>

          <!-- Input 2 -->
          <div class="mb-5">
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >Amount</label
            >
            <input
              id="transfer-amount"
              type="number"
              placeholder="Enter amount to transfer"
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
              required
            />
          </div>

          <!-- Input 3 -->
          <div>
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >4 Digit Pin</label
            >
            <input
              id="transfer-pin"
              type="password"
              placeholder="Enter 4 digit pin number"
              maxlength="4"
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
              required
            />
          </div>

          <!-- Send button -->
          <button
            id="send-btn"
            class="w-full text-lg font-bold text-white bg-blue-800 hover:bg-blue-700 py-2 rounded-full mt-6 cursor-pointer"
          >
            Send Now
          </button>
        </form>
      </section>

      <!-- Get Bonus Section -->
      <section
        id="get-bonus-section"
        class="hidden px-5 py-4 bg-white rounded-2xl mb-6 mt-8 mx-5"
      >
        <div class="my-5">
          <h4 class="text-2xl font-bold">Get Bonus</h4>
        </div>

        <form id="form" class="bg-white rounded-2xl mb-6">
          <!-- Input 1 -->
          <div>
            <label for="selected-bank" class="text-gray-800 text-lg font-bold"
              >Enter Bonus Coupon</label
            >
            <input
              id="bonus-coupon"
              type="number"
              placeholder="Enter your coupon"
              class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
              required
            />
          </div>

          <!-- Get Bonus button -->
          <button
            id="send-btn"
            class="w-full text-lg font-bold text-white bg-blue-800 hover:bg-blue-700 py-2 rounded-full mt-6 cursor-pointer"
          >
            Get Bonus
          </button>
        </form>
      </section>
    </main>
    <script src="./js/uitlities.js"></script>
    <script src="./js/home.js"></script>
  </body>
</html>
