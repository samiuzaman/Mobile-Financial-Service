<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Payoo</title>
    <!-- Link External CSS File -->
    <link rel="stylesheet" href="style.css" />
    <!-- Link Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Inter Font CDN Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome CDN Link -->
    <script
      src="https://kit.fontawesome.com/27daea0603.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main
      class="bg-gray-200 w-3/10 py-56 px-6 mx-auto border border-gray-200 mt-4"
    >
      <div class="flex justify-center mb-8">
        <img src="./assets/Logo-full.png" alt="" />
      </div>
      <form id="form" class="px-5 py-6 bg-white rounded-2xl mb-6">
        <!-- Input 1 -->
        <div class="mb-5">
          <label for="selected-bank" class="text-gray-800 text-lg font-bold"
            >Mobile Number</label
          >
          <input
            id="mobile-number"
            type="number"
            placeholder="Enter your number"
            class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
            required
          />
        </div>

        <!-- Input 2 -->
        <div>
          <label for="selected-bank" class="text-gray-800 text-lg font-bold"
            >4 Digit Pin</label
          >
          <input
            id="pin"
            type="password"
            placeholder="Enter 4 digit pin"
            maxlength="4"
            class="w-full bg-gray-200 px-4 py-3 rounded-xl mt-2 placeholder:text-lg"
            required
          />
        </div>

        <!-- Login button -->
        <button
          id="login-btn"
          class="w-full text-lg font-bold text-white bg-blue-800 hover:bg-blue-700 py-2 rounded-full mt-6 cursor-pointer"
        >
          Login
        </button>
      </form>
    </main>

    <script src="./login-script.js"></script>
  </body>
</html>
